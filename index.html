<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign-up form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="leftsidecard">

            <div class="logocontainer">
                <img id="logo" src="./img/odin-lined.png" alt="The odin project logo"  height="120px">
                <span id="logotext">ODIN</span>
            </div>

            <footer>Photo by <a href="http://">Halie West</a> on <a href="http://">Unsplash</a></footer>
        </div>
        <div class="formcontainer">
            <div class="commentcontainer">
                <div id="commentone">
                        <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</p>
                </div>
                <div id="commenttwo">
                    <p>You <em>know<em> you want to.</p>
                </div>
            </div>
            <div class="form">
                <form action="https://httpbin.org/post" method="post">
                <div id="formbodycontainer">    
                <div id="formbody">
                    <legend>Let's do this!</legend>
                    <div class="details">
                        <div>
                            <label for="fname">FIRST NAME</label><br>
                            <input type="text" name="first_name" id="fname" maxlength="20"><br><br>

                            <label for="email">EMAIL</label><br>
                            <input type="email" name="email" id="email"><br><br>

                            <label for="passwd">PASSWORD</label><br>
                            <input type="password" name="password" id="passwd" maxlength="8"><br><br>
                        </div>
                        <div>
                            <label for="lname">LAST NAME</label><br>
                            <input type="text" name="last_name" id="lname" maxlength="20"><br><br>

                            <label for="phone">PHONE NUMBER</label><br>
                            <input type="number" name="phone" id="phone"><br><br>

                            <label for="confpasswd">CONFIRM PASSWORD</label><br>
                            <input type="password" name="confpasswd" id="confpasswd" maxlength="8"><br><br>
                        </div>
                    </div>
                </div>
                </div>
                <div class="actionbtncontainer">
                    <button type="submit">Create Account</button>
                    <p id="actiontext">Already have an account? <span id="login">Log in</span></p>
                </div>
                </form>
            </div>
            
        </div>
    </div>
    
</body>
</html>
